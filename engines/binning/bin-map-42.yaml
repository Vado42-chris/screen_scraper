engine: binning
version: 1
status: screen_scraper_initial
model: 42_bins_plus_43_observer

purpose: provide an initial reusable bin map for writing, source, media, metadata, rights, provider, export, and runtime events

observer_layer:
  id: 43
  name: observer
  purpose: detect unresolved state, contradictions, freshness drift, missing evidence, blocked actions, and cross-bin inconsistency

bins:
  - id: 01
    key: document_structure
    label: Document Structure
    description: headings, sections, outline, TOC, document hierarchy
  - id: 02
    key: writing_flow
    label: Writing Flow
    description: prose drafting, continuation, rewrite, paragraph/section movement
  - id: 03
    key: review_comments
    label: Review Comments
    description: comments, suggestions, track-change-like review state
  - id: 04
    key: section_prompts
    label: Section Prompts
    description: active outline prompts, prompt staleness, prompt usage
  - id: 05
    key: story_spine
    label: Story Spine
    description: chapters, scenes, beats, storyboard cards, planning nodes
  - id: 06
    key: characters
    label: Characters
    description: characters, aliases, roles, continuity links
  - id: 07
    key: locations
    label: Locations
    description: places, settings, maps, location continuity
  - id: 08
    key: timeline_events
    label: Timeline Events
    description: chronology, causal chain, story events, history events
  - id: 09
    key: source_ingress
    label: Source Ingress
