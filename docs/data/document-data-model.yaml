    owner: user
    lifecycle_states: [created, active, updated, migrated, archived]
    visibility_default: project
    storage_location: database
    repo_safe: false
    fields:
      - name: rights_profile_id
        type: uuid
        required: true
        default: null
        source: system
        validation: unique
        pii_or_sensitive: false
        visibility: project
        redaction_rule: none
      - name: default_author
        type: string
        required: false
        default: null
        source: user
        validation: optional
        pii_or_sensitive: true
        visibility: project
        redaction_rule: redact_if_requested
      - name: default_license_id
        type: string
        required: true
        default: ALL_RIGHTS_RESERVED
        source: user
        validation: license registry id
        pii_or_sensitive: false
        visibility: project
        redaction_rule: none
      - name: default_rights_status
        type: string
        required: true
        default: protected
        source: user
        validation: protected|open|public_domain|restricted|unknown|mixed|needs_review
        pii_or_sensitive: false
        visibility: project
        redaction_rule: none
    relationships:
      - related_object: InsertedItemMetadata
        relationship_type: inherited_by
        cardinality: one_to_many
        required: false
    events_created: [rights.project_profile_created, rights.project_profile_updated]
    events_consumed: [rights.migration_applied]
    ledger_entries: [rights]
    audit_required_actions: [change_project_rights_profile, apply_rights_migration]

  - object_name: StoryNode
    object_type: entity
