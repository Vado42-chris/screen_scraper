    owner: user/system
    lifecycle_states: [idea, planned, needs_research, ready_to_draft, drafting, drafted, needs_revision, reviewed, locked, cut]
    visibility_default: project
    storage_location: database
    repo_safe: false
    fields:
      - name: story_node_id
        type: uuid
        required: true
        default: null
        source: system
        validation: unique
        pii_or_sensitive: false
        visibility: project
        redaction_rule: none
      - name: parent_id
        type: uuid|null
        required: false
        default: null
        source: user/system
        validation: references StoryNode
        pii_or_sensitive: false
        visibility: project
        redaction_rule: none
      - name: node_type
        type: string
        required: true
        default: custom
        source: user/template/system
        validation: part|chapter|section|scene|beat|appendix|custom
        pii_or_sensitive: false
        visibility: project
        redaction_rule: none
      - name: title
        type: string
        required: true
        default: Untitled Node
        source: user
        validation: non_empty
        pii_or_sensitive: false
        visibility: project
        redaction_rule: none
    relationships:
      - related_object: HeadingAnchor
        relationship_type: may_link_to
        cardinality: one_to_one
        required: false
      - related_object: SectionPrompt
        relationship_type: may_generate
        cardinality: one_to_many
        required: false
    events_created: [plan.node_created, plan.node_reordered, plan.card_updated]
    events_consumed: [outline.create_story_node_from_heading]
    ledger_entries: [planning]
    audit_required_actions: [delete_story_node, major_reorder]

  - object_name: Snapshot
    object_type: entity
    description: Restorable point-in-time checkpoint for project, document, source library, index, lexicon, export, or full workspace.
    owner: user/system
    lifecycle_states: [created, retained, restored, archived, deleted]
    visibility_default: local_only
    storage_location: vault
    repo_safe: false
    fields:
      - name: snapshot_id
        type: uuid
        required: true
        default: null
        source: snapshot_service
        validation: unique
        pii_or_sensitive: false
        visibility: project
        redaction_rule: none
      - name: snapshot_type
        type: string
        required: true
        default: document
        source: user/system
        validation: project|document|source_library|analysis_index|lexicon|export|workspace
        pii_or_sensitive: false
        visibility: project
        redaction_rule: none
      - name: archive_ref
        type: vault_ref
        required: true
        default: null
        source: snapshot_service
        validation: vault only
        pii_or_sensitive: true
        visibility: vault_only
        redaction_rule: reference_only
    relationships:
      - related_object: Project
        relationship_type: belongs_to
        cardinality: many_to_one
        required: true
    events_created: [snapshot.created, rollback.previewed, rollback.completed]
    events_consumed: [document.saved, source.imported, metadata.approved]
    ledger_entries: [snapshot]
    audit_required_actions: [rollback_restore, delete_snapshot]

qual_quant_requirements:
  qualitative_fields:
    - title
    - description
    - summary
    - prompt_text
    - notes
    - provenance
  quantitative_fields:
    - word_count
    - heading_level
    - confidence
    - source_relevance_score
    - metadata_confidence
    - image_width
    - image_height
  derived_ai_labels:
    - label: metadata proposal
      source: metadata analyzer
      confidence_required: true
      user_correction_path: MetadataReviewPanel
      marked_as_derived_not_truth: true
    - label: section prompt
      source: AI gateway / planning service
      confidence_required: false
      user_correction_path: SectionPromptPanel
      marked_as_derived_not_truth: true
    - label: source relevance
      source: retrieval/analysis engine
      confidence_required: true
      user_correction_path: EvidenceDrawer
      marked_as_derived_not_truth: true

privacy_safety_security:
  sensitive_classes:
    - private_document_text
    - private_source_text
    - vault_path
    - provider_secret
    - generated_media_file
  local_only_objects:
    - Project
    - Document
    - SourceArtifact
    - MediaAsset
    - Snapshot
  vault_only_objects:
    - raw source text
    - private document snapshots
    - generated media files
    - exports containing private content
  redaction_rules:
    - expose IDs and safe summaries in repo docs, not private content
    - never store API keys in data model examples
    - store full source/document content outside Git
  prohibited_repo_content:
    - vault contents
    - source libraries
    - model files
    - embeddings
    - generated private media
    - secrets
  consent_requirements:
    - cloud AI use
    - cloud image generation using private text
    - destructive rollback
    - rights migration

rbac_visibility:
  roles:
    - owner
    - editor_later
    - viewer_later
    - agent_limited
  permission_domains:
    - document_edit
    - source_import
    - metadata_approval
    - rights_management
    - provider_config
    - export
    - rollback
  object_visibility_rules:
    - local_only objects remain outside public repo
    - vault_only content can be referenced by ID but not exposed
  agent_permissions:
    - agents may propose changes
    - agents may not silently apply document rewrites
    - agents may not silently change rights metadata
    - agents may not send private content to cloud without policy approval

validation_rules:
  required_checks:
    - all_objects_have_owner
    - all_fields_have_type
    - sensitive_fields_have_visibility
    - local_or_vault_objects_are_not_repo_safe
    - relationships_are_defined
    - event_touchpoints_are_mapped
    - audit_required_actions_are_listed
  artifact_valid_when:
    - every primary object is defined
    - fields and relationships are explicit
    - storage boundaries are clear
    - qual_quant_needs are represented where relevant
    - privacy and RBAC rules are mapped

freshness_rules:
  mark_stale_when:
    - editor schema changes
    - event taxonomy changes
    - media model changes
    - metadata lifecycle changes
    - rights model changes
    - storage strategy changes
    - provider policy changes

acceptance_criteria:
  - MVP document objects are sufficient for document create/save/version, active outline, section prompts, source references, image insertion, metadata approval, rights defaults, snapshots, and event linkage.
  - Private content is excluded from repo-safe examples.
  - AI-derived labels are correctable by the user.
  - Event touchpoints are mapped for all core objects.

open_gaps:
  - SourceArtifact full data model should be split into its own file.
  - Media generation job model should be expanded before image provider implementation.
  - ExportJob model should be expanded before DOCX/PDF support.
  - Final editor engine may require additional node/range anchor fields.
